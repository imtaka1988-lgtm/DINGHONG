<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顶红体育后台 — 比赛直播管理</title>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/common.css" rel="stylesheet">
<style>
  .match-row { background:#fff; border-radius:10px; padding:20px; margin-bottom:12px;
    border:1px solid #eee; transition:all 0.2s; }
  .match-row:hover { border-color:#ddd; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .match-row .team-name { font-size:18px; font-weight:700; color:#1a1a2e; }
  .match-row .meta { font-size:13px; color:#888; }
  .match-row .stream-badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; }
  .stream-badge.on { background:#d4edda; color:#155724; }
  .stream-badge.off { background:#f8d7da; color:#721c24; }
  .btn-group-sm .btn { border-radius:6px; font-size:12px; padding:5px 12px; }
</style>
</head>
<body>

<nav class="nav-top">
  <div class="brand">顶红<span>体育</span></div>
  <div class="nav-links">
    <a class="nav-btn active" href="matches.html">比赛管理</a>
    <a class="nav-btn" href="ad-config.html">广告配置</a>
    <a class="nav-btn" href="wechat-greeting.html">欢迎语</a>
    <a class="nav-btn" href="articles.html">AI编辑部</a>
    <a class="nav-btn" href="#" onclick="dhLogout()">退出</a>
  </div>
</nav>

<div class="main-container">
  <div class="page-header">
    <h2>🏀 比赛直播管理</h2>
    <div class="subtitle">管理比赛信息、直播源和二维码</div>
  </div>

  <div class="card main-card p-3 mb-4">
    <h5 class="mb-3" style="font-weight:600;">➕ 新增比赛</h5>
    <div class="row g-2">
      <div class="col-md-2"><input class="form-control" id="league" placeholder="联赛，例如：英超"></div>
      <div class="col-md-3"><input class="form-control" id="teams" placeholder="主队 VS 客队"></div>
      <div class="col-md-2"><input class="form-control" id="time" placeholder="时间，例如：06-09 20:00"></div>
      <div class="col-md-4"><input class="form-control" id="streamUrl" placeholder="临时直播源（FLV / HLS）"></div>
      <div class="col-md-1"><button class="btn btn-success w-100" onclick="add()" style="height:38px;">新增</button></div>
    </div>
  </div>

  <div class="card p-3">
    <h5 class="mb-3" style="font-weight:600;">📋 比赛列表</h5>
    <div id="list"></div>
  </div>
</div>

<div class="modal fade" id="streamModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="border-radius:12px;">
      <div class="modal-header">
        <h5 class="modal-title">更新直播源</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="modalId">
        <div class="mb-2 small" style="color:#888;" id="modalMatchName"></div>
        <label class="form-label fw-bold">直播源地址</label>
        <textarea class="form-control mb-3" id="modalStreamUrl" rows="4" placeholder="填写 FLV / HLS 源地址"></textarea>
        <div class="alert" style="background:#fff3cd;border:none;border-radius:8px;font-size:13px;">二维码绑定播放页 key，换源无需重新生成二维码。</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary" onclick="saveStream()">保存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>

<script>
var allMatches = [];
var streamModal = null;

function getQrUrl(m){ return m.qr || m.qrcodeUrl || m.qrcode_url || ''; }

function load(){
  DH_API.getJson('/admin/matches?t=' + Date.now())
  .then(function(data){ allMatches = data || []; render(); })
  .catch(function(e){ dhAlert('加载失败：' + e.message, 'error'); });
}

function render(){
  var html = '';
  allMatches.forEach(function(m){
    var playUrl = m.playUrl || ('https://live.5q.lol/play.html?key=' + (m.streamKey || ('live_' + m.id)));
    var hasStream = !!m.streamUrl;
    var hasQr = !!getQrUrl(m);
    var teamLabel = (m.home || '') + ' VS ' + (m.away || '');
    var shortUrl = (m.streamUrl || '').length > 50 ? (m.streamUrl || '').substring(0,50) + '...' : (m.streamUrl || '未配置');
    html += '<div class="match-row">' +
      '<div class="row align-items-center">' +
        '<div class="col-md-3">' +
          '<div class="team-name">' + escapeHtml(teamLabel) + '</div>' +
          '<div class="meta">#' + m.id + ' · ' + escapeHtml(m.league || '赛事') + ' · ' + escapeHtml(m.time || '待定') + '</div>' +
        '</div>' +
        '<div class="col-md-4">' +
          '<span class="stream-badge ' + (hasStream?'on':'off') + '">' + (hasStream?'● 已配置':'○ 未配置') + '</span>' +
          '<div class="small text-truncate mt-1" style="color:#666;font-size:12px;">' + escapeHtml(shortUrl) + '</div>' +
        '</div>' +
        '<div class="col-md-2 text-center">' +
          (hasQr ? '<img src="' + escapeHtml(getQrUrl(m)) + '?v=' + Date.now() + '" style="max-height:72px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);" onerror="this.style.display=\'none\'">'
                 : '<div style="color:#aaa;font-size:12px;">暂无二维码</div>') +
        '</div>' +
        '<div class="col-md-3">' +
          '<div class="btn-group-sm d-flex flex-wrap gap-1">' +
            '<button class="btn btn-primary btn-sm" onclick="openStreamModal(' + m.id + ')">📡 更新源</button>' +
            '<button class="btn btn-success btn-sm" onclick="generateQr(' + m.id + ')">📱 生成码</button>' +
            '<button class="btn btn-outline-primary btn-sm" onclick="viewQr(' + m.id + ')">查看</button>' +
            '<button class="btn btn-outline-dark btn-sm" onclick="copyPlayUrl(' + m.id + ')">复制</button>' +
            '<button class="btn btn-danger btn-sm" onclick="del(' + m.id + ')">删除</button>' +
          '</div>' +
        '</div>' +
      '</div></div>';
  });
  if(!html) html = '<div class="text-center" style="color:#aaa;padding:40px;">暂无比赛数据</div>';
  document.getElementById('list').innerHTML = html;
}

function add(){
  var leagueVal = val('league'); var teamsVal = val('teams');
  if(!leagueVal || !teamsVal){ dhAlert('联赛和主队VS客队不能为空', 'warn'); return; }
  var parts = teamsVal.split(/\s+VS\s+/i);
  var home = parts[0] ? parts[0].trim() : '';
  var away = parts[1] ? parts[1].trim() : '';
  if(!home || !away){ dhAlert('请输入"主队 VS 客队"格式', 'warn'); return; }
  DH_API.postJson('/admin/matches', { league: leagueVal, home: home, away: away, time: val('time'), status: 'WAITING', streamUrl: val('streamUrl'), streamType: 'auto', showInWechat: 1, keywords: '', qr: '' })
  .then(function(){ setVal('league',''); setVal('teams',''); setVal('time',''); setVal('streamUrl',''); load(); })
  .catch(function(e){ dhAlert(e.message, 'error'); });
}

function matchById(id){ return allMatches.find(function(x){ return Number(x.id) === Number(id); }); }

function openStreamModal(id){
  if(!DH_API.checkId(id)) return;
  var m = matchById(id); if(!m){ dhAlert('比赛不存在', 'error'); return; }
  document.getElementById('modalId').value = id;
  document.getElementById('modalMatchName').innerText = '#' + id + ' ' + (m.home || '') + ' VS ' + (m.away || '');
  setVal('modalStreamUrl', m.streamUrl || '');
  if(!streamModal) streamModal = new bootstrap.Modal(document.getElementById('streamModal'));
  streamModal.show();
}
function saveStream(){
  var id = val('modalId'); if(!id) return;
  DH_API.putJson('/admin/matches/' + id + '/stream', { streamUrl: val('modalStreamUrl'), streamType: 'auto', status: 'AVAILABLE', showInWechat: 1 })
  .then(function(){ if(streamModal) streamModal.hide(); load(); })
  .catch(function(e){ dhAlert(e.message, 'error'); });
}
function generateQr(id){
  if(!DH_API.checkId(id)) return;
  if(!dhConfirm('确定生成/刷新二维码吗？')) return;
  DH_API.postForm('/admin/matches/' + id + '/qr', '')
  .then(function(t){
    if(t.indexOf('ok|') === 0){ var url = t.split('|')[1] || ''; var m = matchById(id); if(m && url){ m.qr = url; m.qrcodeUrl = url; m.qrcode_url = url; } dhAlert('二维码已生成', 'success'); load(); }
    else { dhAlert('结果：' + t); load(); }
  }).catch(function(e){ dhAlert('失败：' + e.message, 'error'); });
}
function viewQr(id){
  if(!DH_API.checkId(id)) return; var m = matchById(id);
  if(!m || !getQrUrl(m)){ dhAlert('暂无二维码', 'warn'); return; }
  window.open(getQrUrl(m) + '?v=' + Date.now(), '_blank');
}
function copyPlayUrl(id){
  if(!DH_API.checkId(id)) return; var m = matchById(id); if(!m) return;
  var url = m.playUrl || ('https://live.5q.lol/play.html?key=' + (m.streamKey || ('live_' + id)));
  if(navigator.clipboard){ navigator.clipboard.writeText(url).then(function(){ dhAlert('已复制', 'success'); }); }
  else { prompt('复制链接', url); }
}
function del(id){
  if(!DH_API.checkId(id)) return; var m = matchById(id);
  var name = m ? (m.home + ' vs ' + m.away) : ('ID=' + id);
  if(!dhConfirm('确定删除 ' + name + ' 吗？')) return;
  DH_API.del('/admin/matches/' + id).then(function(){ load(); }).catch(function(e){ dhAlert(e.message, 'error'); });
}
load();
</script>
</body>
</html>
