<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prompt管理中心</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/common.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-4">🧠 Prompt管理中心</h2>

<div class="mb-3">
    <a class="btn btn-secondary" href="matches.html">比赛管理</a>
    <a class="btn btn-secondary" href="articles.html">AI编辑部</a>
</div>

<div id="list"></div>

</div>

<script src="js/common.js"></script>

<script>

function load(){
    DH_API.getJson('/admin/prompts')
    .then(function(data){
        var html = '';

        data.forEach(function(p){
            html +=
            '<div class="card mb-3">' +
                '<div class="card-header">' +
                    '<b>' + (p.name || '') + '</b>' +
                    ' (' + (p.code || '') + ')' +
                '</div>' +
                '<div class="card-body">' +
                    '<textarea class="form-control mb-2" rows="8" id="c' + p.id + '">' + (p.content || '') + '</textarea>' +
                    '<select class="form-control mb-2" id="s' + p.id + '">' +
                        '<option value="ENABLED" ' + (p.status=='ENABLED'?'selected':'') + '>ENABLED</option>' +
                        '<option value="DISABLED" ' + (p.status=='DISABLED'?'selected':'') + '>DISABLED</option>' +
                    '</select>' +
                    '<button class="btn btn-success" onclick="save(' + p.id + ',\'' + (p.name || '') + '\')">保存</button>' +
                '</div>' +
            '</div>';
        });

        var list = document.getElementById('list');
        if(list) list.innerHTML = html;
    })
    .catch(function(e){
        dhAlert('Prompt列表加载失败', 'error');
    });
}

function save(id, name){
    if(!DH_API.checkId(id)) return;

    var contentEl = document.getElementById('c' + id);
    var statusEl = document.getElementById('s' + id);

    if(!contentEl || !statusEl){
        dhAlert('表单元素未找到', 'error');
        return;
    }

    DH_API.putJson('/admin/prompts/' + id, {
        name: name,
        content: contentEl.value,
        status: statusEl.value
    })
    .then(function(t){
        dhAlert('保存成功', 'success');
    })
    .catch(function(e){
        dhAlert('保存失败', 'error');
    });
}

load();

</script>

</body>
</html>
