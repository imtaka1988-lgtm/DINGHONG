<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>顶红体育后台登录</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container" style="max-width:400px;margin-top:120px;">

<div class="card p-4">

<h3 class="mb-4 text-center">顶红体育后台</h3>

<form id="loginForm" onsubmit="return false;">
<input id="username" class="form-control mb-3" placeholder="账号" autocomplete="username">
<input id="password" type="password" class="form-control mb-3" placeholder="密码" autocomplete="current-password">
<button id="loginBtn" class="btn btn-primary w-100" type="button" onclick="login()">
登录
</button>
</form>

<div id="loginError" class="text-danger small mt-2" style="display:none;"></div>

</div>

</div>

<script src="js/common.js"></script>
<script>

// 检查 token 是否有效
(function() {
  var token = localStorage.getItem('dh_token');
  if (token) {
    fetch('/admin/check-auth', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        location.href = 'matches.html';
      } else {
        localStorage.removeItem('dh_token');
        localStorage.removeItem('login');
      }
    })
    .catch(function() {
      localStorage.removeItem('dh_token');
      localStorage.removeItem('login');
    });
  }
})();

var loginLocked = false;

function login(){
    if(loginLocked) return;

    var u = val('username');
    var p = val('password');
    var errBox = document.getElementById('loginError');

    if(!u || !p){
        errBox.style.display = 'block';
        errBox.innerText = '请输入账号和密码';
        return;
    }

    var btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerText = '登录中...';
    errBox.style.display = 'none';

    fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'username=' + encodeURIComponent(u) + '&password=' + encodeURIComponent(p)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            localStorage.setItem('dh_token', data.token);
            localStorage.setItem('login', 'ok');
            location.href = 'matches.html';
        } else {
            loginLocked = true;
            btn.disabled = true;
            btn.innerText = '请稍后重试...';
            errBox.style.display = 'block';
            errBox.innerText = data.message || '账号或密码错误，3秒后可重试';

            setTimeout(function(){
                loginLocked = false;
                btn.disabled = false;
                btn.innerText = '登录';
            }, 3000);
        }
    })
    .catch(function(e) {
        loginLocked = true;
        btn.disabled = true;
        btn.innerText = '请稍后重试...';
        errBox.style.display = 'block';
        errBox.innerText = '网络错误，无法连接服务器';

        setTimeout(function(){
            loginLocked = false;
            btn.disabled = false;
            btn.innerText = '登录';
        }, 3000);
    });
}

// 回车键登录
document.getElementById('password').addEventListener('keydown', function(e){
    if(e.key === 'Enter') login();
});
document.getElementById('username').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('password').focus();
});
</script>

</body>
</html>
