<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>顶红体育后台登录</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container" style="max-width:400px;margin-top:120px;">

<div class="card p-4">

<h3 class="mb-4 text-center">顶红体育后台</h3>

<div class="alert alert-warning small">
  请尽快迁移至后端 JWT Token 认证（详见 optimization-report.md）。
</div>

<form id="loginForm" onsubmit="return false;">
<input id="username" class="form-control mb-3" placeholder="账号" autocomplete="username">
<input id="password" type="password" class="form-control mb-3" placeholder="密码" autocomplete="current-password">
<button id="loginBtn" class="btn btn-primary w-100" type="button" onclick="login()">
登录
</button>
</form>

<div id="loginError" class="text-danger small mt-2" style="display:none;"></div>

</div>

</div>

<script src="js/common.js"></script>
<script>

// 已登录直接跳转
if(localStorage.getItem('login')==='ok'){
    location.href='matches.html';
}

var loginLocked = false;

function login(){
    if(loginLocked) return;

    var u = val('username');
    var p = val('password');
    var errBox = document.getElementById('loginError');

    if(!u || !p){
        errBox.style.display = 'block';
        errBox.innerText = '请输入账号和密码';
        return;
    }

    // 当前过渡阶段：仍然用前端比对，请尽快替换为后端 API 认证
    if(u==='admin' && p==='DingHong2026'){
        errBox.style.display = 'none';
        localStorage.setItem('login','ok');
        location.href='matches.html';
    }else{
        loginLocked = true;
        var btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerText = '请稍后重试...';
        errBox.style.display = 'block';
        errBox.innerText = '账号或密码错误，3秒后可重试';

        setTimeout(function(){
            loginLocked = false;
            btn.disabled = false;
            btn.innerText = '登录';
        }, 3000);
    }
}

// 回车键登录
document.getElementById('password').addEventListener('keydown', function(e){
    if(e.key === 'Enter') login();
});
document.getElementById('username').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('password').focus();
});
</script>

</body>
</html>
