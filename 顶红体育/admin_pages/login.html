<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顶红体育后台 — 登录</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/common.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:#fff; border-radius:16px; padding:40px; width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
  .login-box .logo { text-align:center; margin-bottom:32px; }
  .login-box .logo h3 { font-weight:700; color:#1a1a2e; font-size:22px; }
  .login-box .logo h3 span { color:#e74c3c; }
  .login-box .logo p { color:#999; font-size:13px; margin:0; }
  .login-box input { height:44px; border-radius:8px; }
  .login-box .btn-login { height:44px; border-radius:8px; font-weight:600; font-size:15px;
    background: linear-gradient(135deg, #c0392b, #e74c3c); border:none; color:#fff; }
  .login-box .btn-login:hover { background: linear-gradient(135deg, #e74c3c, #c0392b); }
  .login-box .btn-login:disabled { opacity:.6; cursor:not-allowed; }
  #loginError { min-height:20px; }
  .input-icon { position:relative; }
  .input-icon .ico { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#aaa; font-size:16px; }
  .input-icon input { padding-left:36px; }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">
    <h3>顶红<span>体育</span></h3>
    <p>赛事直播 · 智能写作 · 数据分析</p>
  </div>

  <form id="loginForm" onsubmit="return false;">
    <div class="input-icon mb-3">
      <span class="ico">👤</span>
      <input id="username" class="form-control" placeholder="请输入账号" autocomplete="username">
    </div>
    <div class="input-icon mb-3">
      <span class="ico">🔒</span>
      <input id="password" type="password" class="form-control" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button id="loginBtn" class="btn btn-login w-100" type="button" onclick="login()">登 录</button>
  </form>

  <div id="loginError" class="text-danger small mt-3 text-center" style="display:none;"></div>
</div>

<script src="js/common.js"></script>
<script>
(function() {
  var token = localStorage.getItem('dh_token');
  if (token) {
    fetch('/admin/check-auth', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) { location.href = 'matches.html'; }
      else { localStorage.removeItem('dh_token'); localStorage.removeItem('login'); }
    })
    .catch(function() { localStorage.removeItem('dh_token'); localStorage.removeItem('login'); });
  }
})();

var loginLocked = false;

function login(){
  if(loginLocked) return;
  var u = val('username'); var p = val('password');
  var errBox = document.getElementById('loginError');
  if(!u || !p){ errBox.style.display='block'; errBox.innerText='请输入账号和密码'; return; }
  var btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerText = '登录中...'; errBox.style.display = 'none';

  fetch('/admin/login', {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'username='+encodeURIComponent(u)+'&password='+encodeURIComponent(p)
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.success){ localStorage.setItem('dh_token',data.token); localStorage.setItem('login','ok'); location.href='matches.html'; }
    else { loginLocked=true; btn.disabled=true; btn.innerText='请稍后重试...'; errBox.style.display='block'; errBox.innerText=data.message||'账号或密码错误，3秒后可重试';
      setTimeout(function(){ loginLocked=false; btn.disabled=false; btn.innerText='登 录'; },3000); }
  })
  .catch(function(e){ loginLocked=true; btn.disabled=true; btn.innerText='请稍后重试...'; errBox.style.display='block'; errBox.innerText='网络错误，无法连接服务器';
    setTimeout(function(){ loginLocked=false; btn.disabled=false; btn.innerText='登 录'; },3000); });
}

document.getElementById('password').addEventListener('keydown',function(e){ if(e.key==='Enter') login(); });
document.getElementById('username').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('password').focus(); });
</script>
</body>
</html>
