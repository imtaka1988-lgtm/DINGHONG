<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>顶红体育编辑部</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/common.css" rel="stylesheet">
</head>

<body class="bg-light">

<div id="loadingBox">
  <div>
    <h4>编辑部正在处理...</h4>
    <div class="progress mt-3">
      <div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%"></div>
    </div>
    <p class="mt-3 text-muted">请稍等，不要关闭页面</p>
  </div>
</div>

<div class="container mt-4">

<h2 class="mb-4">📝 顶红体育编辑部</h2>

<div class="mb-3">
<a class="btn btn-outline-primary" href="matches.html">比赛管理</a>
<a class="btn btn-outline-success" href="ad-config.html">广告配置</a>
<a class="btn btn-outline-info" href="wechat-greeting.html">每日欢迎语</a>
<a class="btn btn-primary" href="articles.html">AI编辑部</a>
<a class="btn btn-warning" href="prompts.html">人设管理</a>
<button class="btn btn-primary" onclick="load()">刷新文章</button>
<button class="btn btn-danger" onclick="deleteBeforeToday()">删除今天以前文章</button>
</div>

<div class="card p-3 mb-4">
<h5>生成文章</h5>

<div class="row g-2">
<div class="col-md-2"><input class="form-control" id="league" placeholder="联赛，例如：英超"></div>
<div class="col-md-2"><input class="form-control" id="matchHome" placeholder="主队"></div>
<div class="col-md-2"><input class="form-control" id="matchAway" placeholder="客队"></div>
<div class="col-md-2"><input class="form-control" id="matchTime" placeholder="时间，例如：06-09 20:00"></div>
<div class="col-md-2">
<select class="form-control" id="author">
<option value="akai">阿凯｜篮球</option>
<option value="laotang">老唐｜足球</option>
<option value="xiaobei">小北｜数据</option>
<option value="laozhou">老周｜总编</option>
</select>
</div>
<div class="col-md-2">
<select class="form-control" id="category" onchange="toggleRelated()">
<option value="PREVIEW">赛前预测</option>
<option value="REVIEW">赛后复盘</option>
</select>
</div>

<div class="col-md-2" id="relatedBox" style="display:none;">
<select class="form-control" id="relatedArticleId"><option value="">关联预测文章</option></select>
</div>
<div class="col-md-2">
<button id="generateBtn" class="btn btn-success" onclick="generate()">生成文章</button>
</div>
</div>
</div>

<div class="card p-3">
<h5>文章列表</h5>
<table class="table table-bordered table-hover align-middle">
<thead>
<tr>
<th>ID</th>
<th>标题</th>
<th>作者</th>
<th>类型</th>
<th>状态</th>
<th>关联</th>
<th>创建时间</th>
<th>操作</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>
</div>

</div>

<div class="modal fade" id="articleModal" tabindex="-1">
<div class="modal-dialog modal-xl">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title" id="modalTitle">文章详情</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<pre id="modalContent" style="white-space:pre-wrap;font-size:15px;line-height:1.8;"></pre>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>

<script>
var newestId = 0;

function authorName(code){
    if(code === 'laozhou') return '老周';
    if(code === 'akai') return '阿凯';
    if(code === 'laotang') return '老唐';
    if(code === 'xiaobei') return '小北';
    return code || '-';
}

function categoryName(code){
    if(code === 'PREVIEW') return '赛前预测';
    if(code === 'REVIEW') return '赛后复盘';
    return code || '-';
}

function statusName(status){
    if(status === 'APPROVED') return '🟢 待生成草稿';
    if(status === 'DRAFT') return '🟡 未生成草稿';
    if(status === 'DRAFTED') return '🟣 已生成草稿';
    if(status === 'PUBLISHING') return '🟠 发布中';
    if(status === 'PUBLISHED') return '🔵 已发布';
    if(status === 'PUB_FAILED') return '🔴 发布失败';
    if(status === 'ARCHIVED') return '⚫ 已归档';
    return status || '-';
}

function toggleRelated(){
    var box = document.getElementById('relatedBox');
    if(box) box.style.display = val('category') === 'REVIEW' ? 'block' : 'none';
}

function loadPreviewArticles(){
    DH_API.getJson('/editor/articles')
    .then(function(data){
        var html = '<option value="">选择关联预测文章</option>';
        data.filter(function(a){ return (a.category || a.type) === 'PREVIEW'; }).forEach(function(a){
            html += '<option value="' + a.id + '">' + a.id + '  ' + a.title + '</option>';
        });
        var sel = document.getElementById('relatedArticleId');
        if(sel) sel.innerHTML = html;
    })
    .catch(function(e){ dhAlert('加载关联文章失败', 'error'); });
}

function load(){
    loadPreviewArticles();
    DH_API.getJson('/editor/articles')
    .then(function(data){
        var html = '';
        try { newestId = data.length > 0 ? data[0].id : 0; } catch(e) {}
        data.forEach(function(a, index){
            var newTag = index === 0 ? '<span class="badge bg-success">NEW</span>' : '';
            html += '<tr>' +
                '<td>' + a.id + ' ' + newTag + '</td>' +
                '<td>' + escapeHtml(a.title || '') + '</td>' +
                '<td>' + authorName(a.author) + '</td>' +
                '<td>' + categoryName(a.category || a.type) + '</td>' +
                '<td>' + statusName(a.status) + '</td>' +
                '<td>' + (a.relatedArticleId && a.relatedArticleId != 0 ? a.relatedArticleId : '-') + '</td>' +
                '<td>' + escapeHtml(a.createdAt || '') + '</td>' +
                '<td>' +
                    '<button class="btn btn-sm btn-info" onclick="detail(' + a.id + ')">查看</button> ' +
                    '<button class="btn btn-sm btn-primary" onclick="preparePublish(' + a.id + ')">生成草稿</button> ' +
                    '<button class="btn btn-sm btn-dark" onclick="publishWechat(' + a.id + ')">发布</button> ' +
                    '<button class="btn btn-sm btn-outline-dark" onclick="queryWechatPublish(' + a.id + ')">查询状态</button> ' +
                    (a.articleUrl ? '<a class="btn btn-sm btn-outline-success" target="_blank" href="' + a.articleUrl + '">查看文章</a> ' : '') +
                    ((a.category || a.type) === 'PREVIEW' ? '<button class="btn btn-sm btn-warning" onclick="generateReview(' + a.id + ')">生成复盘</button> ' : '') +
                    '<button class="btn btn-sm btn-danger" onclick="deleteArticle(' + a.id + ')">删除</button>' +
                '</td>' +
            '</tr>';
        });
        var list = document.getElementById('list');
        if(list) list.innerHTML = html;
    })
    .catch(function(e){ dhAlert('加载失败', 'error'); });
}

function detail(id){
    if(!DH_API.checkId(id)) return;
    DH_API.getJson('/editor/articles/' + id)
    .then(function(a){
        var text = '';
        text += '标题：' + a.title + '\n';
        text += '作者：' + authorName(a.author) + '\n';
        text += '类型：' + categoryName(a.category || a.type) + '\n';
        text += '状态：' + statusName(a.status) + '\n';
        text += '关联ID：' + (a.relatedArticleId && a.relatedArticleId != 0 ? a.relatedArticleId : '-') + '\n\n';
        text += '======== 公众号预览 ========\n';
        text += '标题：' + (a.wechatTitle || '-') + '\n';
        text += '摘要：' + (a.wechatSummary || '-') + '\n';
        text += '封面：' + (a.coverText || '-') + '\n\n';
        text += '======== 正文 ========\n\n';
        text += (a.finalContent || '暂未生成');
        var titleEl = document.getElementById('modalTitle');
        if(titleEl) titleEl.innerText = a.title;
        var contentEl = document.getElementById('modalContent');
        if(contentEl) contentEl.innerText = text;
        new bootstrap.Modal(document.getElementById('articleModal')).show();
    })
    .catch(function(e){ dhAlert('加载失败', 'error'); });
}

function generate(){
    var league = val('league');
    var home = val('matchHome');
    var away = val('matchAway');
    var matchTime = val('matchTime');
    if(!league || !home || !away){ dhAlert('请输入联赛、主队、客队', 'warn'); return; }

    var matchInfo = league + ' ' + home + ' VS ' + away;
    if(matchTime) matchInfo += ' ' + matchTime;

    var btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerText = '生成中...';
    showLoading('正在联网检索并生成文章，请稍候...');

    var category = val('category');
    var body = 'matchInfo=' + encodeURIComponent(matchInfo)
        + '&author=' + encodeURIComponent(val('author'))
        + '&category=' + encodeURIComponent(category);
    if(category === 'REVIEW' && val('relatedArticleId')){
        body += '&relatedArticleId=' + encodeURIComponent(val('relatedArticleId'));
    }

    DH_API.postForm('/editor/generate', body)
    .then(function(t){
        hideLoading();
        btn.disabled = false;
        btn.innerText = '生成文章';
        if(String(t).trim() === 'success'){ dhAlert('文章生成成功', 'success'); }
        else { dhAlert('结果：' + t, /blocked|失败|错误|error|禁止/i.test(t) ? 'error' : 'warn'); }
        refreshList();
    })
    .catch(function(e){
        hideLoading();
        btn.disabled = false;
        btn.innerText = '生成文章';
        dhAlert(e.message || '生成失败', 'error');
        refreshList();
    });
}

function refreshList(){ load(); setTimeout(load, 800); setTimeout(load, 1800); }

function publishWechat(id){
    if(!DH_API.checkId(id)) return;
    if(!dhConfirm('确定发布到公众号吗？')) return;
    showLoading();
    DH_API.postForm('/editor/wechat-publish/' + id, '')
    .then(function(t){
        hideLoading();
        if(t.indexOf('published:')===0){ dhAlert('发布成功', 'success'); }
        else if(t.indexOf('正在发布中')>=0){ dhAlert(t); }
        else{ dhAlert('结果：' + t); }
        load();
    })
    .catch(function(){ hideLoading(); dhAlert('发布失败', 'error'); });
}

function queryWechatPublish(id){
    if(!DH_API.checkId(id)) return;
    showLoading();
    DH_API.postForm('/editor/wechat-publish-status/' + id, '')
    .then(function(t){
        hideLoading();
        dhAlert(t.indexOf('published:')===0 ? '发布成功' : '状态：' + t);
        load();
    })
    .catch(function(){ hideLoading(); dhAlert('查询失败', 'error'); });
}

function generateReview(previewId){
    if(!DH_API.checkId(previewId)) return;
    if(!dhConfirm('确定基于这篇预测文章生成赛后复盘吗？')) return;
    showLoading('正在生成复盘文章，请稍候...');
    DH_API.postForm('/editor/generate-review/' + previewId, '')
    .then(function(t){
        hideLoading();
        if(String(t).trim() === 'success'){ dhAlert('复盘文章生成成功', 'success'); }
        else { dhAlert('结果：' + t, /blocked|失败|错误|error|禁止/i.test(t) ? 'error' : 'warn'); }
        refreshList();
    })
    .catch(function(e){
        hideLoading();
        dhAlert(e.message || '生成复盘失败', 'error');
        refreshList();
    });
}

function preparePublish(id){
    if(!DH_API.checkId(id)) return;
    if(!dhConfirm('确定生成公众号草稿吗？')) return;
    showLoading();
    DH_API.postForm('/editor/publish-draft/' + id, '')
    .then(function(t){ hideLoading(); dhAlert('结果：' + t); load(); })
    .catch(function(){ hideLoading(); dhAlert('生成草稿失败', 'error'); });
}

function deleteArticle(id){
    if(!DH_API.checkId(id)) return;
    if(!dhConfirm('确定删除？')) return;
    DH_API.postForm('/editor/delete/' + id, '')
    .then(function(t){ dhAlert('结果：' + t); load(); })
    .catch(function(e){ dhAlert('删除失败', 'error'); });
}

function deleteBeforeToday(){
    if(!dhConfirm('确定删除今天以前所有文章？')) return;
    DH_API.postForm('/editor/delete-before-today', '')
    .then(function(t){ dhAlert('结果：' + t); load(); })
    .catch(function(e){ dhAlert('删除失败', 'error'); });
}

setTimeout(function(){ load(); }, 300);
load();
</script>

</body>
</html>
