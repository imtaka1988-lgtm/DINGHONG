<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顶红体育直播入口</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;
    display:flex;align-items:center;justify-content:center;}
  .card{background:#fff;border-radius:16px;padding:40px 48px;max-width:440px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .card h2{color:#1a1a2e;margin-bottom:12px;font-size:22px;}
  .card h2 span{color:#e74c3c;}
  .card p{color:#666;font-size:14px;margin:8px 0;line-height:1.6;}
  .card .divider{width:48px;height:3px;background:linear-gradient(90deg,#c0392b,#e74c3c);
    margin:16px auto;border-radius:2px;}
  .btn-live{display:inline-block;margin-top:20px;padding:12px 32px;
    background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;font-weight:700;
    border:none;border-radius:24px;text-decoration:none;font-size:14px;cursor:pointer;
    box-shadow:0 4px 12px rgba(192,57,43,0.4);transition:all 0.2s;}
  .btn-live:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,57,43,0.5);}
  .live-dot{display:inline-block;width:8px;height:8px;background:#e74c3c;border-radius:50%;
    margin-right:6px;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="card">
  <h2>顶红<span>体育</span></h2>
  <div class="divider"></div>
  <noscript><p style="color:#e74c3c;">请启用 JavaScript 以查看直播</p></noscript>
  <div id="content"><p style="color:#888;">正在获取直播信息...</p></div>
</div>
<script>
(function(){
  var key = (location.search.match(/key=([a-z0-9_\-]+)/i) || [])[1];
  if (key) { location.replace('play.html?key=' + encodeURIComponent(key)); return; }
  document.getElementById('content').innerHTML =
    '<div class="live-dot"></div><p style="color:#e74c3c;margin-top:16px;">请从顶红体育公众号菜单进入观看直播</p>' +
    '<p style="color:#999;font-size:12px;">如需帮助，请尝试重新关注公众号后重试</p>';
})();
</script>
</body>
</html>
