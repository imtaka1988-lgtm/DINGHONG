# ============================================
# 顶红体育 — Docker 完整 Nginx 配置
# 你的 Docker 直接把整个 nginx.conf 挂载到 /etc/nginx/nginx.conf
# ============================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;

    # 速率限制（必须在 http 块内）
    limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ===== api.5q.lol =====
    server {
        listen 80;
        server_name api.5q.lol;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            limit_req zone=admin burst=20 nodelay;
            proxy_pass http://127.0.0.1:8080/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /editor/ {
            limit_req zone=admin burst=20 nodelay;
            proxy_pass http://127.0.0.1:8080/editor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /upload/ {
            alias /data/dinghong/upload/;
        }
    }

    # ===== admin.5q.lol =====
    server {
        listen 80;
        server_name admin.5q.lol;

        root /usr/share/nginx/admin;
        index login.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /admin/ {
            proxy_pass http://127.0.0.1:8080/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /editor/ {
            proxy_pass http://127.0.0.1:8080/editor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /upload/ {
            alias /data/dinghong/upload/;
        }

        location / {
            try_files $uri $uri/ /login.html;
        }
    }

    # ===== live.5q.lol =====
    server {
        listen 80;
        server_name live.5q.lol;

        root /usr/share/nginx/admin/live;
        index play.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /live/ {
            proxy_pass http://127.0.0.1:8080/live/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            set $cors_origin "";
            if ($http_origin ~* "^https?://(live\.5q\.lol|admin\.5q\.lol)$") {
                set $cors_origin $http_origin;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET,OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Authorization' always;
        }

        location / {
            try_files $uri $uri/ /play.html;
        }
    }
}