# ===== 安全基础配置（所有 server 共用） =====
# 访问频率限制
limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# ===== api.5q.lol =====
server {
    listen 80;
    server_name api.5q.lol;
    # 生产环境建议开启 HTTPS 并做 301 跳转：
    # return 301 https://$host$request_uri;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        limit_req zone=admin burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /editor/ {
        limit_req zone=admin burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080/editor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /upload/ {
        alias /www/wwwroot/dinghong/upload/;
    }
}

# ===== admin.5q.lol =====
server {
    listen 80;
    server_name admin.5q.lol;
    # 生产环境建议开启 HTTPS 并做 301 跳转：
    # return 301 https://$host$request_uri;

    root /www/wwwroot/dinghong/admin;
    index login.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /admin/ {
        proxy_pass http://127.0.0.1:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /editor/ {
        proxy_pass http://127.0.0.1:8080/editor/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /upload/ {
        alias /www/wwwroot/dinghong/upload/;
    }

    location / {
        try_files $uri $uri/ /login.html;
    }
}

# ===== live.5q.lol =====
server {
    listen 80;
    server_name live.5q.lol;
    # 生产环境建议开启 HTTPS 并做 301 跳转：
    # return 301 https://$host$request_uri;

    root /www/wwwroot/dinghong/admin/live;
    index play.html;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /live/ {
        proxy_pass http://127.0.0.1:8080/live/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # CORS: 仅允许来自自己域名的跨域请求
        set $cors_origin "";
        if ($http_origin ~* "^https?://(live\.5q\.lol|admin\.5q\.lol)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods 'GET,OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type,Authorization' always;
    }

    location / {
        try_files $uri $uri/ /play.html;
    }
}